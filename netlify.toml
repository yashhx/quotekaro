# QuoteKaro - Netlify build + serverless functions (WhatsApp two-way integration)
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA fallback for the client-side app (must NOT catch /.netlify/functions/*)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
