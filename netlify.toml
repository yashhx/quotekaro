# QuoteKaro - Netlify build + serverless functions (WhatsApp two-way integration)
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Gmail inbox poller - every 5 minutes (also invokable from the app with a JWT)
[functions."gmail-poll"]
  schedule = "*/5 * * * *"

# SPA fallback for the client-side app (must NOT catch /.netlify/functions/*)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
